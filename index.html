<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BoxLog - Data Matrix Scanner</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', 'Courier New', Courier, monospace; }
        #reader { border: none !important; background: #000; width: 100% !important; }
        #reader video { border-radius: 1.5rem; object-fit: cover; width: 100% !important; }
        #reader__dashboard, #reader__status_span { display: none !important; }
        .animate-scan { animation: scan 2s linear infinite; }
        @keyframes scan {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(200px); }
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .scanner-hidden { display: none !important; }
    </style>
</head>
<body class="bg-zinc-900 text-white font-sans antialiased selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkFWzu7Uuv-w1QVLwxBJa38saPSuYFRPmYtXhnjNpyylbXveFy-Zvaa-7c6JglCXXEEA/exec';

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                box: <><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></>,
                external: <><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></>,
                trash: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                send: <><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
                scan: <><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" x2="17" y1="12" y2="12"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [items, setItems] = useState([]);
            const [plan, setPlan] = useState(null);
            const [activeTab, setActiveTab] = useState('scanner');
            const [isScanning, setIsScanning] = useState(false);
            const [status, setStatus] = useState({ type: 'idle', msg: '' });
            const scannerInstance = useRef(null);
            
            // Хранилища для предотвращения повторного учета одних и тех же кодов
            const confirmedCodes = useRef(new Set());
            const batchCodes = useRef(new Set());

            const loadPlan = async () => {
                setStatus({ type: 'loading', msg: 'Загрузка плана...' });
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL);
                    const data = await response.json();
                    const enrichedProducts = data.products.map(p => ({ ...p, scannedQty: 0, scannedBoxes: 0 }));
                    setPlan({ ...data, products: enrichedProducts });
                    
                    // Сброс истории при загрузке нового плана
                    confirmedCodes.current = new Set();
                    batchCodes.current = new Set();
                    setItems([]);
                    
                    setStatus({ type: 'success', msg: `План на ${data.date} загружен` });
                } catch (e) {
                    setStatus({ type: 'error', msg: 'Ошибка загрузки плана' });
                }
            };

            useEffect(() => { loadPlan(); }, []);

            useEffect(() => {
                let isMounted = true;
                const startScanner = async () => {
                    if (!isScanning) return;
                    try {
                        const html5QrCode = new Html5Qrcode("reader");
                        scannerInstance.current = html5QrCode;
                        const config = { fps: 20, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
                        
                        const fixEncoding = (str) => {
                            if (!str) return "";
                            if (/[а-яА-ЯёЁ]/.test(str)) return str.replace(/\u001d/g, ' ').trim();
                            try {
                                const cp1252Map = {
                                    0x20AC: 0x80, 0x201A: 0x82, 0x0192: 0x83, 0x201E: 0x84, 0x2026: 0x85, 
                                    0x2020: 0x86, 0x2021: 0x87, 0x02C6: 0x88, 0x2030: 0x89, 0x0160: 0x8A, 
                                    0x2039: 0x8B, 0x0152: 0x8C, 0x017D: 0x8E, 0x2018: 0x91, 0x2019: 0x92, 
                                    0x201C: 0x93, 0x201D: 0x94, 0x2022: 0x95, 0x2013: 0x96, 0x2014: 0x97, 
                                    0x02DC: 0x98, 0x2122: 0x99, 0x0161: 0x9A, 0x203A: 0x9B, 0x0153: 0x9C, 
                                    0x017E: 0x9E, 0x0178: 0x9F
                                };
                                const bytes = new Uint8Array([...str].map(c => {
                                    const code = c.charCodeAt(0);
                                    return cp1252Map[code] || (code & 0xFF);
                                }));
                                try {
                                    const utf8Decoded = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
                                    if (/[а-яА-ЯёЁ]/.test(utf8Decoded)) return utf8Decoded.replace(/\u001d/g, ' ').trim();
                                } catch (e) {}
                                const cp1251Decoded = new TextDecoder('windows-1251').decode(bytes);
                                if (/[а-яА-ЯёЁ]/.test(cp1251Decoded)) return cp1251Decoded.replace(/\u001d/g, ' ').trim();
                                return str.replace(/\u001d/g, ' ').trim();
                            } catch (e) { return str.replace(/\u001d/g, ' ').trim(); }
                        };

                        const onScanSuccess = (text) => {
                            if (!isMounted) return;
                            const decodedText = fixEncoding(text);
                            
                            // Проверка: был ли этот код уже отправлен или он уже в текущем списке
                            if (confirmedCodes.current.has(decodedText)) {
                                setStatus({ type: 'info', msg: 'Уже отправлено в таблицу' });
                                return;
                            }
                            if (batchCodes.current.has(decodedText)) {
                                setStatus({ type: 'info', msg: 'Уже в списке' });
                                return;
                            }

                            const parts = decodedText.split(/\s*[|;]\s*/).map(p => p.trim()).filter(p => p.length > 0);
                            const productName = parts[0];

                            batchCodes.current.add(decodedText);

                            setItems(prev => {
                                let matched = false;
                                setPlan(currentPlan => {
                                    if (!currentPlan) return null;
                                    const updatedProducts = currentPlan.products.map(p => {
                                        if (p.name === productName) {
                                            matched = true;
                                            return { 
                                                ...p, 
                                                scannedQty: p.scannedQty + (Number(p.packing) || 0),
                                                scannedBoxes: p.scannedBoxes + 1
                                            };
                                        }
                                        return p;
                                    });
                                    return { ...currentPlan, products: updatedProducts };
                                });

                                if (navigator.vibrate) navigator.vibrate(matched ? [100, 50, 100] : 70);
                                return [{ data: decodedText, time: new Date().toLocaleTimeString(), matched }, ...prev];
                            });
                            setStatus({ type: 'success', msg: 'Код считан!' });
                        };

                        try {
                            await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, () => {});
                        } catch (e) {
                            await html5QrCode.start({ facingMode: "user" }, config, onScanSuccess, () => {});
                        }
                    } catch (err) {
                        if (isMounted) {
                            setStatus({ type: 'error', msg: 'Ошибка камеры' });
                            setIsScanning(false);
                        }
                    }
                };
                startScanner();
                return () => {
                    isMounted = false;
                    if (scannerInstance.current) {
                        const scanner = scannerInstance.current;
                        scannerInstance.current = null;
                        const cleanup = async () => {
                            try { if (scanner.isScanning) await scanner.stop(); scanner.clear(); } catch (e) {}
                        };
                        cleanup();
                    }
                };
            }, [isScanning, plan]);

            const sendData = async () => {
                if (!items.length) return;
                setStatus({ type: 'loading', msg: 'Отправка данных...' });
                try {
                    const preparedItems = items.map(item => {
                        const parts = item.data.split(/\s*[|;]\s*/).map(p => p.trim()).filter(p => p.length > 0);
                        return { time: item.time, data: item.data, parts: parts.length > 0 ? parts : [item.data] };
                    });
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(preparedItems)
                    });
                    
                    // Переносим коды из текущей пачки в "подтвержденные"
                    batchCodes.current.forEach(code => confirmedCodes.current.add(code));
                    batchCodes.current.clear();
                    
                    setItems([]);
                    setStatus({ type: 'success', msg: 'Данные сохранены!' });
                } catch (e) { setStatus({ type: 'error', msg: 'Ошибка отправки' }); }
            };

            const clearQueue = () => {
                if (!items.length) return;
                if (plan) {
                    setPlan(currentPlan => {
                        const updatedProducts = currentPlan.products.map(p => {
                            const itemsToSubtract = items.filter(item => {
                                const parts = item.data.split(/\s*[|;]\s*/).map(p => p.trim()).filter(p => p.length > 0);
                                return parts[0] === p.name;
                            });
                            if (itemsToSubtract.length > 0) {
                                return {
                                    ...p,
                                    scannedQty: Math.max(0, p.scannedQty - (itemsToSubtract.length * (Number(p.packing) || 0))),
                                    scannedBoxes: Math.max(0, p.scannedBoxes - itemsToSubtract.length)
                                };
                            }
                            return p;
                        });
                        return { ...currentPlan, products: updatedProducts };
                    });
                }
                batchCodes.current.clear();
                setItems([]);
                setStatus({ type: 'info', msg: 'Очередь очищена' });
            };

            const renderItemData = (data) => {
                const parts = data.split(/\s*[|;]\s*/).map(p => p.trim()).filter(p => p.length > 0);
                if (parts.length > 1) {
                    return (
                        <div className="space-y-1">
                            <p className="font-mono text-[11px] text-blue-400 break-all font-bold leading-tight">{parts[0]}</p>
                            <div className="flex flex-wrap gap-1">
                                {parts.slice(1).map((p, idx) => (
                                    <span key={idx} className="bg-blue-500/10 text-blue-300 text-[9px] px-1.5 py-0.5 rounded border border-blue-500/20">{p}</span>
                                ))}
                            </div>
                        </div>
                    );
                }
                return <p className="font-mono text-[11px] text-blue-400 break-all font-bold leading-tight">{data}</p>;
            };

            const getProgress = () => {
                if (!plan || plan.products.length === 0) return 0;
                const totalExpected = plan.products.reduce((acc, p) => acc + (Number(p.expectedBoxes) || 0), 0);
                const totalScanned = plan.products.reduce((acc, p) => acc + p.scannedBoxes, 0);
                return totalExpected > 0 ? Math.round((totalScanned / totalExpected) * 100) : 0;
            };

            return (
                <div className="min-h-screen p-4 pb-36 max-w-md mx-auto">
                    <header className="mb-6 pt-2">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/20">
                                    <Icon name="box" className="text-white w-5 h-5" />
                                </div>
                                <h1 className="text-xl font-black uppercase italic tracking-tighter">BoxLog</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={loadPlan} className="p-3 bg-zinc-800 rounded-2xl text-zinc-400 active:bg-blue-600 active:text-white transition-all">
                                    <Icon name="clock" />
                                </button>
                                <button onClick={clearQueue} className="p-3 bg-zinc-800 rounded-2xl text-zinc-400 active:bg-red-600 active:text-white transition-all">
                                    <Icon name="trash" />
                                </button>
                            </div>
                        </div>

                        <div className="flex bg-zinc-800 p-1 rounded-2xl">
                            <button onClick={() => setActiveTab('scanner')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'scanner' ? 'bg-zinc-700 text-white shadow-lg' : 'text-zinc-500'}`}>Сканер</button>
                            <button onClick={() => setActiveTab('plan')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'plan' ? 'bg-zinc-700 text-white shadow-lg' : 'text-zinc-500'}`}>План {plan && <span className="ml-1 text-blue-400">({getProgress()}%)</span>}</button>
                        </div>
                    </header>

                    {status.msg && (
                        <div className={`mb-6 p-4 rounded-2xl text-center text-[10px] font-black uppercase tracking-[0.2em] shadow-xl animate-in fade-in slide-in-from-top-4 ${
                            status.type === 'success' ? 'bg-green-600 shadow-green-900/20' : 
                            status.type === 'error' ? 'bg-red-600 shadow-red-900/20' : 
                            status.type === 'info' ? 'bg-zinc-600 shadow-zinc-900/20' : 'bg-blue-600 shadow-blue-900/20'
                        }`}>{status.msg}</div>
                    )}

                    {activeTab === 'scanner' ? (
                        <>
                            <main className="bg-zinc-800 rounded-[2.5rem] overflow-hidden border-4 border-zinc-800 shadow-2xl mb-8 relative min-h-[250px] flex items-center justify-center">
                                <div className={`w-full p-2 ${!isScanning ? 'scanner-hidden' : ''}`}>
                                    <div dangerouslySetInnerHTML={{ __html: '<div id="reader" style="border-radius: 2rem; overflow: hidden; aspect-ratio: 1/1; background: #000;"></div>' }} />
                                    <div className="absolute inset-0 pointer-events-none border-2 border-blue-500/30 m-12 rounded-2xl">
                                        <div className="w-full h-0.5 bg-blue-500/60 shadow-[0_0_15px_rgba(59,130,246,0.5)] animate-scan"></div>
                                    </div>
                                    <button onClick={() => setIsScanning(false)} className="w-full py-4 mt-2 bg-zinc-700/30 rounded-2xl text-zinc-400 font-black text-[10px] uppercase tracking-widest active:bg-zinc-700">Остановить</button>
                                </div>
                                {!isScanning && (
                                    <button onClick={() => setIsScanning(true)} className="w-full py-20 flex flex-col items-center gap-6 active:scale-95 transition-transform">
                                        <div className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-2xl shadow-blue-900/40"><Icon name="camera" className="w-10 h-10" /></div>
                                        <div className="text-center">
                                            <span className="block font-black uppercase tracking-widest text-xs">Начать сканирование</span>
                                            <span className="text-[10px] text-zinc-500 uppercase mt-1 block">Data Matrix / QR</span>
                                        </div>
                                    </button>
                                )}
                            </main>

                            <section className="space-y-3">
                                <div className="flex justify-between items-end px-2 mb-2">
                                    <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Отсканировано</p>
                                    <p className="text-xs font-bold text-blue-500 bg-blue-500/10 px-3 py-1 rounded-full">{items.length}</p>
                                </div>
                                {items.length === 0 ? (
                                    <div className="py-16 text-center border-2 border-dashed border-zinc-800 rounded-[2.5rem]">
                                        <Icon name="scan" className="w-8 h-8 text-zinc-700 mx-auto mb-3" />
                                        <p className="text-zinc-600 text-[10px] font-black uppercase tracking-widest">Очередь пуста</p>
                                    </div>
                                ) : (
                                    <div className="space-y-2">
                                        {items.map((item, i) => (
                                            <div key={i} className={`p-4 rounded-2xl flex justify-between items-center border animate-in slide-in-from-left-4 ${item.matched ? 'bg-green-500/5 border-green-500/20' : 'bg-zinc-800/40 border-zinc-800/50'}`}>
                                                <div className="min-w-0 flex-1 pr-4">
                                                    {renderItemData(item.data)}
                                                    <p className="text-[8px] text-zinc-600 font-black uppercase mt-1.5 flex items-center gap-1">
                                                        <Icon name="clock" className="w-2 h-2" /> {item.time}
                                                        {item.matched && <span className="text-green-500 ml-2 font-bold tracking-widest">● В ПЛАНЕ</span>}
                                                    </p>
                                                </div>
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${item.matched ? 'bg-green-500/20' : 'bg-zinc-700/30'}`}>
                                                    <Icon name="check" className={`${item.matched ? 'text-green-500' : 'text-zinc-500'} w-4 h-4`} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </section>
                        </>
                    ) : (
                        <section className="space-y-4 animate-in fade-in slide-in-from-bottom-4">
                            <div className="px-2">
                                <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">План на {plan?.date}</h2>
                                <div className="h-1.5 w-full bg-zinc-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-blue-600 transition-all duration-500" style={{ width: `${getProgress()}%` }}></div>
                                </div>
                            </div>
                            <div className="space-y-2">
                                {plan?.products.map((prod, idx) => {
                                    const isDone = prod.scannedBoxes >= prod.expectedBoxes;
                                    return (
                                        <div key={idx} className={`p-4 rounded-2xl border transition-all ${isDone ? 'bg-green-500/10 border-green-500/30 opacity-60' : 'bg-zinc-800 border-zinc-700'}`}>
                                            <p className="text-xs font-bold leading-tight mb-2">{prod.name}</p>
                                            <div className="flex justify-between items-end">
                                                <div className="space-y-1">
                                                    <p className="text-[9px] text-zinc-500 uppercase font-black">Коробок: <span className={prod.scannedBoxes > 0 ? 'text-blue-400' : ''}>{prod.scannedBoxes}</span> / {prod.expectedBoxes}</p>
                                                    <p className="text-[9px] text-zinc-500 uppercase font-black">Штук: <span className={prod.scannedQty > 0 ? 'text-blue-400' : ''}>{prod.scannedQty.toLocaleString()}</span> / {prod.expectedQty.toLocaleString()}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className={`text-[10px] font-black ${isDone ? 'text-green-500' : 'text-zinc-400'}`}>{Math.round((prod.scannedBoxes / (prod.expectedBoxes || 1)) * 100)}%</p>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>
                    )}

                    {items.length > 0 && activeTab === 'scanner' && (
                        <div className="fixed bottom-8 left-6 right-6 z-50">
                            <button onClick={sendData} className="w-full py-6 bg-blue-600 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-blue-900/60 active:scale-95 transition-all flex items-center justify-center gap-3 border-b-4 border-blue-800">
                                <Icon name="send" className="w-4 h-4" /> Подтвердить приёмку ({items.length})
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
